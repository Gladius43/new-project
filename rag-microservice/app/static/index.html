<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f7f2;
        --paper: #ffffff;
        --ink: #182019;
        --muted: #4f5b51;
        --line: #d5ddd1;
        --accent: #0f8f78;
        --accent-2: #f08d49;
        --mono: "IBM Plex Mono", monospace;
        --sans: "Sora", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: var(--sans);
        background:
          radial-gradient(circle at 12% 15%, #c2eadf 0%, transparent 42%),
          radial-gradient(circle at 88% 8%, #ffd8b9 0%, transparent 35%),
          linear-gradient(160deg, #f9faf8, var(--bg));
        min-height: 100vh;
      }

      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 18px 42px;
      }

      .title {
        margin: 0;
        font-size: clamp(1.65rem, 3vw, 2.6rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.96rem;
        max-width: 760px;
      }

      .status {
        margin-top: 16px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--mono);
        font-size: 0.85rem;
        color: #0f6f5f;
        background: #e8fbf6;
        border: 1px solid #bde8dc;
        border-radius: 999px;
        padding: 8px 12px;
      }

      .grid {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 8px 24px rgba(14, 37, 19, 0.04);
      }

      h2 {
        margin: 0 0 14px;
        font-size: 1.08rem;
      }

      form {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.83rem;
        color: var(--muted);
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font: 400 0.9rem var(--sans);
        color: var(--ink);
        background: #fff;
      }

      textarea {
        min-height: 78px;
        resize: vertical;
        font-family: var(--mono);
        font-size: 0.8rem;
      }

      .split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        font: 600 0.92rem var(--sans);
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), #087b68);
      }

      .btn.secondary {
        background: linear-gradient(135deg, var(--accent-2), #d8712d);
      }

      .btn:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .json-box {
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fbfdf9;
        padding: 10px;
        overflow: auto;
      }

      pre {
        margin: 0;
        font-family: var(--mono);
        font-size: 0.75rem;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .results {
        margin-top: 12px;
        display: grid;
        gap: 10px;
      }

      .result-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: #fff;
      }

      .result-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 8px;
        font-size: 0.73rem;
        font-family: var(--mono);
        color: #2f3a31;
      }

      .pill {
        border: 1px solid #d2dcd1;
        background: #f4f8f4;
        border-radius: 999px;
        padding: 2px 8px;
      }

      .snippet {
        margin: 0;
        font-size: 0.86rem;
        color: #273229;
      }

      @media (max-width: 920px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1 class="title">RAG Upload & Search Console</h1>
      <p class="subtitle">
        Upload PDF, DOCX or UTF-8 text files directly into your vector store and run semantic search without curl.
      </p>
      <div class="status" id="healthStatus">Checking API health...</div>

      <section class="grid">
        <article class="card">
          <h2>Upload Document</h2>
          <form id="uploadForm">
            <label>
              File (pdf/docx/txt/md/csv/json/log/rst)
              <input type="file" name="file" required />
            </label>
            <div class="split">
              <label>Topic name <input type="text" name="topic_name" value="demo-topic" required /></label>
              <label>Project name <input type="text" name="project_name" value="demo-project" required /></label>
            </div>
            <div class="split">
              <label>Title (optional) <input type="text" name="title" /></label>
              <label>Language <input type="text" name="language" value="en" /></label>
            </div>
            <div class="split">
              <label>Max chars <input type="number" name="max_chars" value="1000" min="100" /></label>
              <label>Overlap chars <input type="number" name="overlap_chars" value="200" min="0" /></label>
            </div>
            <label>
              Source metadata (JSON object)
              <textarea name="source_metadata">{}</textarea>
            </label>
            <label>
              Document metadata (JSON object)
              <textarea name="document_metadata">{}</textarea>
            </label>
            <button type="submit" class="btn" id="uploadBtn">Upload</button>
          </form>
          <div class="json-box"><pre id="uploadOutput">No upload yet.</pre></div>
        </article>

        <article class="card">
          <h2>Semantic Search</h2>
          <form id="searchForm">
            <label>Query <input type="text" name="query" placeholder="Ask something..." required /></label>
            <div class="split">
              <label>Top K <input type="number" name="top_k" value="5" min="1" max="100" /></label>
              <label>Topic filter <input type="text" name="topic_name" value="demo-topic" /></label>
            </div>
            <label>Project filter <input type="text" name="project_name" value="demo-project" /></label>
            <button type="submit" class="btn secondary" id="searchBtn">Search</button>
          </form>
          <div class="results" id="searchResults"></div>
          <div class="json-box"><pre id="searchOutput">No search yet.</pre></div>
        </article>
      </section>
    </main>

    <script>
      const healthStatusEl = document.getElementById("healthStatus");
      const uploadForm = document.getElementById("uploadForm");
      const searchForm = document.getElementById("searchForm");
      const uploadBtn = document.getElementById("uploadBtn");
      const searchBtn = document.getElementById("searchBtn");
      const uploadOutput = document.getElementById("uploadOutput");
      const searchOutput = document.getElementById("searchOutput");
      const searchResults = document.getElementById("searchResults");

      function renderJSON(target, data) {
        target.textContent = JSON.stringify(data, null, 2);
      }

      function renderError(target, errText) {
        target.textContent = errText;
      }

      function renderResults(results) {
        searchResults.innerHTML = "";
        if (!results || results.length === 0) {
          searchResults.innerHTML = "<div class='result-card'><p class='snippet'>No matches.</p></div>";
          return;
        }

        for (const item of results) {
          const card = document.createElement("div");
          card.className = "result-card";
          card.innerHTML = `
            <div class="result-meta">
              <span class="pill">distance: ${item.distance.toFixed(4)}</span>
              <span class="pill">doc: ${item.document_id}</span>
              <span class="pill">source: ${item.source_id}</span>
              <span class="pill">${item.source.topic_name} / ${item.source.project_name}</span>
            </div>
            <p class="snippet">${item.content}</p>
          `;
          searchResults.appendChild(card);
        }
      }

      async function checkHealth() {
        try {
          const response = await fetch("/health");
          const payload = await response.json();
          if (!response.ok) {
            healthStatusEl.textContent = "API health check failed";
            return;
          }
          healthStatusEl.textContent = `API status: ${payload.status}`;
        } catch (_) {
          healthStatusEl.textContent = "API is unreachable from this page.";
        }
      }

      uploadForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        uploadBtn.disabled = true;
        uploadBtn.textContent = "Uploading...";
        uploadOutput.textContent = "Uploading...";

        const formData = new FormData(uploadForm);

        try {
          const response = await fetch("/upload", { method: "POST", body: formData });
          const text = await response.text();
          if (!response.ok) {
            renderError(uploadOutput, `HTTP ${response.status}: ${text}`);
            return;
          }
          renderJSON(uploadOutput, JSON.parse(text));
        } catch (err) {
          renderError(uploadOutput, `Request failed: ${err}`);
        } finally {
          uploadBtn.disabled = false;
          uploadBtn.textContent = "Upload";
        }
      });

      searchForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        searchBtn.disabled = true;
        searchBtn.textContent = "Searching...";
        searchOutput.textContent = "Searching...";

        const form = new FormData(searchForm);
        const payload = {
          query: String(form.get("query") || ""),
          top_k: Number(form.get("top_k") || 5),
        };
        const topic = String(form.get("topic_name") || "").trim();
        const project = String(form.get("project_name") || "").trim();
        if (topic) payload.topic_name = topic;
        if (project) payload.project_name = project;

        try {
          const response = await fetch("/search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const text = await response.text();
          if (!response.ok) {
            renderError(searchOutput, `HTTP ${response.status}: ${text}`);
            renderResults([]);
            return;
          }
          const data = JSON.parse(text);
          renderJSON(searchOutput, data);
          renderResults(data.results);
        } catch (err) {
          renderError(searchOutput, `Request failed: ${err}`);
          renderResults([]);
        } finally {
          searchBtn.disabled = false;
          searchBtn.textContent = "Search";
        }
      });

      checkHealth();
    </script>
  </body>
</html>
